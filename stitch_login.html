<body class="min-h-screen flex items-center justify-center p-unit-lg md:p-unit-xxl">
<!-- Login Container - Paper Style -->
<main class="w-full max-w-md bg-surface border border-ink-subtle p-unit-xxl relative flex flex-col gap-unit-xl">
<!-- Header -->
<header class="flex flex-col gap-unit-sm text-center">
<h1 class="font-display-xl text-display-xl text-on-surface">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to your Portfolia account.</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-unit-xl" method="POST">
<div class="flex flex-col gap-unit-sm">
<label class="font-label-caps text-label-caps text-on-surface uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full bg-surface border-0 border-b border-ink-subtle py-unit-sm px-0 focus:ring-0 focus:border-secondary font-body-md text-body-md text-on-surface transition-colors" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-unit-sm">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface uppercase tracking-widest" for="password">Password</label>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-surface border-0 border-b border-ink-subtle py-unit-sm px-0 focus:ring-0 focus:border-secondary font-body-md text-body-md text-on-surface transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-unit-lg pt-unit-md">
<button class="w-full bg-primary text-on-primary py-unit-md px-unit-lg font-label-caps text-label-caps uppercase tracking-widest active:translate-y-0.5 active:shadow-[0_2px_0_0_#000] hover:bg-surface-tint transition-all rounded-none border border-primary" type="submit">
                    Login
                </button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-on-surface font-headline-sm text-headline-sm underline decoration-1 underline-offset-4 hover:text-secondary transition-colors" href="#">Register</a>
</p>
</div>
</form>
</main>
